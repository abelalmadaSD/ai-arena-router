apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-arena-router-deployment
  labels:
    app: ai-arena-router
namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-arena-router
  template:
    metadata:
      labels:
        app: ai-arena-router
    spec:
      containers:
      - name: api-router
        image: tu-registro.azurecr.io/ai-arena-router:latest # Reemplazar con tu Azure Container Registry si aplica
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: api-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-arena-router-service
namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: ai-arena-router